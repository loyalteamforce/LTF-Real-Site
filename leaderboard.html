<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTF Liderlik Tablosu | Loyal Team Force</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #050505;
            --bg-card: #0F0F0F;
            --gold: #FFD700;
            --dark-red: #8B0000;
            --white: #FFFFFF;
            --light-blue: #87CEEB;
            --gray-border: #1F1F1F;
            --green-success: #00C851;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 5px; }

        @keyframes slowDrift {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(255, 215, 0, 0.03) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(135, 206, 235, 0.02) 0%, transparent 50%);
            animation: slowDrift 45s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.3); }
            100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.6); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes rotate3d {
            0% { transform: rotateY(0deg) rotateX(0deg); }
            50% { transform: rotateY(180deg) rotateX(15deg); }
            100% { transform: rotateY(360deg) rotateX(0deg); }
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .fade-up { animation: fadeInUp 0.8s ease forwards; }

        .leaderboard-header {
            background: linear-gradient(135deg, #030303 0%, #0a0a0a 100%);
            border-bottom: 2px solid var(--gold);
            padding: 40px 20px 30px;
            text-align: center;
            position: relative;
        }

        .leaderboard-header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold) 0%, #FFE55C 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .back-home {
            position: absolute;
            top: 30px;
            left: 30px;
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-home:hover {
            color: var(--white);
            transform: translateX(-5px);
        }

        /* Günlük Ödül Kutusu */
        .daily-box-section {
            max-width: 1400px;
            margin: 30px auto 0;
            padding: 0 20px;
        }

        .daily-chest {
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .daily-chest:hover { transform: translateY(-3px); border-color: var(--gold); }

        .chest-icon {
            font-size: 4rem;
            color: var(--gold);
            transition: all 0.3s;
            transform-style: preserve-3d;
        }

        .chest-icon.animating {
            animation: rotate3d 0.6s ease-in-out;
        }

        .chest-info h3 { font-size: 1.5rem; margin-bottom: 5px; }
        .chest-info p { color: #aaa; font-size: 0.9rem; }

        .chest-reward { text-align: right; }
        .chest-reward span { font-size: 1.8rem; font-weight: 800; color: var(--gold); }

        .claim-btn {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .claim-btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4); }
        .claim-btn.disabled { background: #333; color: #777; cursor: not-allowed; }
        .claim-btn.disabled:hover { transform: none; }

        .countdown { font-size: 1.2rem; color: var(--light-blue); font-weight: 600; }

        /* XP Kazanma Yöntemleri */
        .xp-methods {
            max-width: 1400px;
            margin: 40px auto 0;
            padding: 0 20px;
        }

        .methods-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .method-card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid var(--gray-border);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .method-card:hover { transform: translateY(-3px); border-color: var(--gold); }
        .method-card i { font-size: 1.8rem; color: var(--gold); margin-bottom: 8px; }
        .method-card h4 { font-size: 0.85rem; margin-bottom: 5px; }
        .method-card p { font-size: 0.75rem; color: var(--light-blue); font-weight: 600; }

        .method-status {
            font-size: 0.7rem;
            margin-top: 8px;
            padding-top: 5px;
            border-top: 1px solid var(--gray-border);
        }

        .method-status.available { color: var(--green-success); }
        .method-status.claimed { color: #666; }

        .section-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Filtre Bölümü */
        .filters-section {
            padding: 40px 20px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .search-bar { display: flex; justify-content: center; margin-bottom: 30px; }
        .search-input {
            background: var(--bg-card);
            border: 1px solid var(--gray-border);
            border-radius: 50px;
            padding: 14px 25px;
            width: 100%;
            max-width: 500px;
            color: var(--white);
            font-size: 1rem;
        }
        .search-input:focus { outline: none; border-color: var(--gold); }

        /* Liderlik Tablosu */
        .leaderboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .leaderboard-grid { display: flex; flex-direction: column; gap: 15px; }

        .leader-card {
            background: linear-gradient(95deg, var(--bg-card) 0%, #0c0c0c 100%);
            border-radius: 20px;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.4s;
            border: 1px solid rgba(255, 215, 0, 0.1);
            animation: fadeInUp 0.6s ease forwards;
        }

        .leader-card:hover { transform: translateY(-5px) scale(1.02); border-color: var(--gold); }
        .leader-card.top-1 { border: 2px solid var(--gold); animation: glowPulse 2s infinite; }

        .rank { font-size: 1.8rem; font-weight: 800; min-width: 60px; text-align: center; }
        .rank-1 { color: var(--gold); }
        .rank-2 { color: #C0C0C0; }
        .rank-3 { color: #CD7F32; }
        .rank-other { color: #666; }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), #FFE55C);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .avatar img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid var(--bg-dark); }
        .medal { position: absolute; bottom: -5px; right: -5px; font-size: 1.2rem; }

        .user-info { flex: 1; }
        .user-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .badge { background: rgba(255, 215, 0, 0.2); color: var(--gold); padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; }
        .level-badge { background: rgba(135, 206, 235, 0.2); color: var(--light-blue); padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; }
        .user-stats span { font-size: 0.8rem; color: #aaa; margin-right: 15px; }

        .xp-section { min-width: 220px; }
        .xp-label { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 5px; color: #aaa; }
        .xp-bar-bg { background: #1e1e1e; height: 8px; border-radius: 10px; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #FFE55C); border-radius: 10px; width: 0%; transition: width 1s ease; }

        .points { text-align: right; min-width: 100px; }
        .points-value { font-size: 1.3rem; font-weight: 800; color: var(--gold); }

        .xp-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--gold), #FFE55C);
            color: #000;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: 700;
            z-index: 1000;
            animation: floatUp 2s ease forwards;
            pointer-events: none;
        }

        @media (max-width: 900px) {
            .leader-card { flex-wrap: wrap; padding: 20px; }
            .rank { min-width: 50px; font-size: 1.3rem; }
            .avatar { width: 50px; height: 50px; }
            .avatar img { width: 45px; height: 45px; }
            .xp-section { min-width: 100%; margin-top: 10px; }
            .points { min-width: auto; }
        }

        footer {
            background: #080808;
            padding: 40px 20px 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.3);
            text-align: center;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="leaderboard-header">
        <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Ana Sayfaya Dön</a>
        <h1><i class="fas fa-trophy"></i> Liderlik Tablosu</h1>
        <p>Otomatik XP Sistemi | Her gün giriş yap, aktif ol, XP kazan!</p>
    </div>

    <!-- Günlük Ödül Kutusu -->
    <div class="daily-box-section">
        <div class="daily-chest" id="dailyChest">
            <div class="chest-icon" id="chestIcon">
                <i class="fas fa-gift"></i>
            </div>
            <div class="chest-info">

                <p>Her gün 1 kez açabilirsin! Rastgele XP kazan!</p>

            <div class="chest-reward">
                <span id="rewardAmount">???</span> XP
            </div>
            <button id="claimBtn" class="claim-btn">Kutuyu Aç</button>
            <div class="countdown" id="countdown"></div>
        </div>
    </div>

    <!-- XP Kazanma Yöntemleri (Otomatik) -->
    <div class="xp-methods">
        <div class="section-title">
            <i class="fas fa-chart-line"></i>
            <span>⚡ Otomatik XP Kazanma Yöntemleri</span>
        </div>
        <div class="methods-grid" id="methodsGrid">
            <!-- JS ile doldurulacak -->
        </div>
    </div>

    <!-- Filtre Bölümü -->
    <div class="filters-section">
        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Kullanıcı adı ile ara...">
        </div>
    </div>

    <!-- Liderlik Tablosu -->
    <div class="leaderboard-container">
        <div id="leaderboardGrid" class="leaderboard-grid"></div>
    </div>

    <footer>
        <p>© 2025 Loyal Team Force - Otomatik XP Sistemi | Aktif ol, XP kazan, seviye atla!</p>
    </footer>

    <script>
        // 15 Kişilik Liderlik Verileri
        let leadersData = [
            { id: 1, name: "Zinny", avatar: "nihishpfp.jpg", xp: 28450, level: 28, activity: 98, role: "Kurucu", lastDaily: null, lastHourly: null, lastChat: null, lastRandom: null, weeklyXP: 0 },
            { id: 2, name: "Chivas", avatar: "ltflogoblack.jpeg", xp: 26780, level: 26, activity: 95, role: "Kurucu Yardımcısı", lastDaily: null, lastHourly: null, lastChat: null, lastRandom: null, weeklyXP: 0 },
            { id: 3, name: "Efe", avatar: "https://randomuser.me/api/portraits/men/32.jpg", xp: 24120, level: 24, activity: 92, role: "Moderatör", lastDaily: null, lastHourly: null, lastChat: null, lastRandom: null, weeklyXP: 0 },
            { id: 4, name: "Mert", avatar: "https://randomuser.me/api/portraits/men/45.jpg", xp: 22340, level: 22, activity: 88, role: "Geliştirici", lastDaily: null, lastHourly: null, lastChat: null, lastRandom: null, weeklyXP: 0 },
            { id: 5, name: "Selin", avatar: "https://randomuser.me/api/portraits/women/28.jpg", xp: 20980, level: 20, activity: 85, role: "Tasarımcı", lastDaily: null, lastHourly: null, lastChat: null, lastRandom: null, weeklyXP: 0 },
            { id: 6, name: "Can", avatar: "https://randomuser.me/api/portraits/men/52.jpg", xp: 19560, level: 19, activity: 82, role: "Geliştirici", lastDaily: null, lastHourly: null, lastChat: null, lastRandom: null, weeklyXP: 0 },
            { id: 7, name: "Zeynep", avatar: "https://randomuser.me/api/portraits/women/45.jpg", xp: 18230, level: 18, activity: 79, role: "Sosyal Medya", lastDaily: null, lastHourly: null, lastChat: null, lastRandom: null, weeklyXP: 0 },
            { id: 8, name: "Kaan", avatar: "https://randomuser.me/api/portraits/men/67.jpg", xp: 16890, level: 16, activity: 75, role: "İçerik Üretici", lastDaily: null, lastHourly: null, lastChat: null, lastRandom: null, weeklyXP: 0 },
            { id: 9, name: "Elif", avatar: "https://randomuser.me/api/portraits/women/62.jpg", xp: 15420, level: 15, activity: 71, role: "Destek", lastDaily: null, lastHourly: null, lastChat: null, lastRandom: null, weeklyXP: 0 },
            { id: 10, name: "Ali", avatar: "https://randomuser.me/api/portraits/men/78.jpg", xp: 14150, level: 14, activity: 68, role: "Üye", lastDaily: null, lastHourly: null, lastChat: null, lastRandom: null, weeklyXP: 0 },
            { id: 11, name: "Ayşe", avatar: "https://randomuser.me/api/portraits/women/33.jpg", xp: 12890, level: 12, activity: 64, role: "Üye", lastDaily: null, lastHourly: null, lastChat: null, lastRandom: null, weeklyXP: 0 },
            { id: 12, name: "Burak", avatar: "https://randomuser.me/api/portraits/men/84.jpg", xp: 11560, level: 11, activity: 60, role: "Üye", lastDaily: null, lastHourly: null, lastChat: null, lastRandom: null, weeklyXP: 0 },
            { id: 13, name: "Cem", avatar: "https://randomuser.me/api/portraits/men/91.jpg", xp: 10230, level: 10, activity: 55, role: "Üye", lastDaily: null, lastHourly: null, lastChat: null, lastRandom: null, weeklyXP: 0 },
            { id: 14, name: "Deniz", avatar: "https://randomuser.me/api/portraits/women/12.jpg", xp: 8950, level: 8, activity: 52, role: "Üye", lastDaily: null, lastHourly: null, lastChat: null, lastRandom: null, weeklyXP: 0 },
            { id: 15, name: "Emre", avatar: "https://randomuser.me/api/portraits/men/23.jpg", xp: 7680, level: 7, activity: 48, role: "Üye", lastDaily: null, lastHourly: null, lastChat: null, lastRandom: null, weeklyXP: 0 }
        ];

        let currentSearch = "";
        let currentUserId = 1; // Giriş yapan kullanıcı (demo: Zinny)

        // Seviye hesaplama (Her 1000 XP = 1 seviye)
        function calculateLevel(xp) { return Math.floor(xp / 1000) + 1; }
        function nextLevelXP(xp) { return (Math.floor(xp / 1000) + 1) * 1000; }

        // Toast bildirimi
        function showToast(message, xpAmount = null) {
            const toast = document.createElement('div');
            toast.className = 'xp-toast';
            if(xpAmount) {
                toast.innerHTML = `✨ +${xpAmount} XP ✨<br>${message}`;
            } else {
                toast.innerHTML = message;
            }
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // XP ekleme ve otomatik seviye atlama
        function addXP(userId, amount, source) {
            const userIndex = leadersData.findIndex(u => u.id === userId);
            if(userIndex === -1) return false;
            
            let oldXP = leadersData[userIndex].xp;
            let oldLevel = leadersData[userIndex].level;
            let newXP = oldXP + amount;
            let newLevel = calculateLevel(newXP);
            
            leadersData[userIndex].xp = newXP;
            leadersData[userIndex].level = newLevel;
            leadersData[userIndex].weeklyXP = (leadersData[userIndex].weeklyXP || 0) + amount;
            
            // Toast göster
            showToast(`${source} ile ${amount} XP kazandın!`, amount);
            
            // Seviye atlama kontrolü
            if(newLevel > oldLevel) {
                showToast(`🎉 TEBRİKLER! Seviye ${newLevel}'e yükseldin! 🎉`);
            }
            
            // Sıralamayı güncelle
            updateRanks();
            renderLeaderboard();
            saveToLocalStorage();
            
            return true;
        }

        // Sıralamayı güncelle
        function updateRanks() {
            leadersData.sort((a, b) => b.xp - a.xp);
            leadersData.forEach((user, idx) => { user.rank = idx + 1; });
        }

        // LocalStorage işlemleri
        function saveToLocalStorage() {
            localStorage.setItem('ltf_leaderboard', JSON.stringify(leadersData));
            localStorage.setItem('ltf_last_claim', lastClaimDate);
            localStorage.setItem('ltf_daily_login', dailyLoginDate);
            localStorage.setItem('ltf_weekly_bonus', weeklyBonusDate);
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('ltf_leaderboard');
            if(saved) {
                const parsed = JSON.parse(saved);
                // Veri yapısını koru
                leadersData.forEach((user, idx) => {
                    if(parsed[idx]) {
                        user.xp = parsed[idx].xp;
                        user.level = parsed[idx].level;
                        user.weeklyXP = parsed[idx].weeklyXP || 0;
                    }
                });
            }
            const savedClaim = localStorage.getItem('ltf_last_claim');
            if(savedClaim) lastClaimDate = savedClaim;
            const savedDaily = localStorage.getItem('ltf_daily_login');
            if(savedDaily) dailyLoginDate = savedDaily;
            const savedWeekly = localStorage.getItem('ltf_weekly_bonus');
            if(savedWeekly) weeklyBonusDate = savedWeekly;
            updateRanks();
        }

        // ============= OTOMATİK XP SİSTEMLERİ =============
        
        // 1. Günlük Giriş XP'si (Sayfa açıldığında otomatik)
        let dailyLoginDate = localStorage.getItem('ltf_daily_login') || '';
        
        function checkDailyLogin() {
            const today = new Date().toDateString();
            if(dailyLoginDate !== today) {
                addXP(currentUserId, 50, "🌟 Günlük Giriş");
                dailyLoginDate = today;
                localStorage.setItem('ltf_daily_login', dailyLoginDate);
                updateMethodStatus('daily', true);
            }
        }
        
        // 2. Günlük Kutu Sistemi
        let lastClaimDate = localStorage.getItem('ltf_last_claim') || '';
        
        function canClaimDaily() {
            if(!lastClaimDate) return true;
            const last = new Date(lastClaimDate);
            const now = new Date();
            return now.getDate() !== last.getDate() || now.getMonth() !== last.getMonth() || now.getFullYear() !== last.getFullYear();
        }
        
        function getRandomXP() { return Math.floor(Math.random() * 401) + 100; }
        
        function claimDailyBox() {
            if(!canClaimDaily()) {
                showToast("🎁 Günlük kutunu zaten açtın! Yarın tekrar dene!");
                return false;
            }
            
            const reward = getRandomXP();
            
            // 3D Animasyon
            const chestIcon = document.getElementById('chestIcon');
            chestIcon.classList.add('animating');
            setTimeout(() => chestIcon.classList.remove('animating'), 600);
            
            addXP(currentUserId, reward, "🎁 Günlük Kutu");
            lastClaimDate = new Date().toISOString();
            localStorage.setItem('ltf_last_claim', lastClaimDate);
            
            document.getElementById("rewardAmount").innerHTML = reward;
            updateDailyButton();
            updateMethodStatus('chest', true);
            return true;
        }
        
        function updateDailyButton() {
            const btn = document.getElementById("claimBtn");
            const countdownDiv = document.getElementById("countdown");
            
            if(canClaimDaily()) {
                btn.classList.remove("disabled");
                btn.disabled = false;
                btn.innerHTML = "🎁 Kutuyu Aç";
                countdownDiv.innerHTML = "";
                document.getElementById("rewardAmount").innerHTML = "???";
                updateMethodStatus('chest', false);
            } else {
                btn.classList.add("disabled");
                btn.disabled = true;
                btn.innerHTML = "⏳ Beklemede";
                const last = new Date(lastClaimDate);
                const tomorrow = new Date(last);
                tomorrow.setDate(tomorrow.getDate() + 1);
                tomorrow.setHours(0, 0, 0, 0);
                const diff = tomorrow - new Date();
                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                countdownDiv.innerHTML = `Yeni kutu: ${hours}s ${minutes}d`;
                updateMethodStatus('chest', true);
            }
        }
        
        // 3. Saatlik Aktiflik XP'si (Her 1 saat)
        let lastHourlyTime = localStorage.getItem('ltf_last_hourly') || 0;
        
        function checkHourlyBonus() {
            const now = Date.now();
            const last = parseInt(lastHourlyTime) || 0;
            if(now - last >= 60 * 60 * 1000) { // 1 saat
                addXP(currentUserId, 25, "⏰ Saatlik Aktiflik");
                lastHourlyTime = now;
                localStorage.setItem('ltf_last_hourly', lastHourlyTime);
                updateMethodStatus('hourly', true);
                return true;
            }
            return false;
        }
        
        // 4. Rastgele Bonus (Her 2 saat)
        let lastRandomTime = localStorage.getItem('ltf_last_random') || 0;
        
        function checkRandomBonus() {
            const now = Date.now();
            const last = parseInt(lastRandomTime) || 0;
            if(now - last >= 2 * 60 * 60 * 1000) {
                const randomXP = Math.floor(Math.random() * 26) + 5; // 5-30 arası
                addXP(currentUserId, randomXP, "🎲 Rastgele Bonus");
                lastRandomTime = now;
                localStorage.setItem('ltf_last_random', lastRandomTime);
                updateMethodStatus('random', true);
                return true;
            }
            return false;
        }
        
        // 5. Haftalık Lider Bonusu (Her hafta en çok XP kazanan)
        let weeklyBonusDate = localStorage.getItem('ltf_weekly_bonus') || '';
        
        function checkWeeklyLeaderBonus() {
            const now = new Date();
            const weekStart = new Date(now);
            weekStart.setDate(now.getDate() - now.getDay());
            const weekKey = weekStart.toDateString();
            
            if(weeklyBonusDate !== weekKey) {
                // En çok XP kazananı bul (haftalık)
                const topGainer = [...leadersData].sort((a, b) => (b.weeklyXP || 0) - (a.weeklyXP || 0))[0];
                if(topGainer && topGainer.id === currentUserId && (topGainer.weeklyXP || 0) > 0) {
                    addXP(currentUserId, 200, "👑 Haftanın Lideri");
                    showToast("👑 Haftanın Lideri oldun! +200 XP kazandın!");
                }
                // Haftalık XP'leri sıfırla
                leadersData.forEach(u => u.weeklyXP = 0);
                weeklyBonusDate = weekKey;
                localStorage.setItem('ltf_weekly_bonus', weeklyBonusDate);
                updateMethodStatus('weekly', true);
            }
        }
        
        // Method durumlarını güncelle
        function updateMethodStatus(method, claimed) {
            const methods = {
                daily: document.getElementById('method-daily'),
                chest: document.getElementById('method-chest'),
                hourly: document.getElementById('method-hourly'),
                random: document.getElementById('method-random'),
                weekly: document.getElementById('method-weekly')
            };
            
            if(methods[method]) {
                const statusSpan = methods[method].querySelector('.method-status');
                if(statusSpan) {
                    if(claimed) {
                        statusSpan.innerHTML = '✓ Alındı';
                        statusSpan.className = 'method-status claimed';
                    } else {
                        statusSpan.innerHTML = '⏳ Bekliyor';
                        statusSpan.className = 'method-status';
                    }
                }
            }
        }
        
        // Tüm otomatik kontrolleri çalıştır
        function runAutoChecks() {
            checkDailyLogin();
            checkHourlyBonus();
            checkRandomBonus();
            checkWeeklyLeaderBonus();
            updateRanks();
            renderLeaderboard();
        }
        
        // XP Bar yüzdesi
        function getXpPercentage(xp) {
            const currentLevelXP = (calculateLevel(xp) - 1) * 1000;
            const xpInCurrentLevel = xp - currentLevelXP;
            return (xpInCurrentLevel / 1000) * 100;
        }
        
        // Lider kartı oluştur
        function renderLeaderCard(user) {
            const rankClass = user.rank === 1 ? 'top-1' : '';
            const rankColorClass = user.rank === 1 ? 'rank-1' : (user.rank === 2 ? 'rank-2' : (user.rank === 3 ? 'rank-3' : 'rank-other'));
            const medalIcon = user.rank === 1 ? '<i class="fas fa-crown"></i>' : (user.rank === 2 ? '<i class="fas fa-medal"></i>' : (user.rank === 3 ? '<i class="fas fa-medal"></i>' : ''));
            
            return `
                <div class="leader-card ${rankClass}">
                    <div class="rank ${rankColorClass}">#${user.rank}</div>
                    <div class="avatar">
                        <img src="${user.avatar}" alt="${user.name}" onerror="this.src='https://randomuser.me/api/portraits/men/1.jpg'">
                        ${medalIcon ? `<div class="medal">${medalIcon}</div>` : ''}
                    </div>
                    <div class="user-info">
                        <div class="user-name">
                            <h3>${user.name} ${user.id === currentUserId ? '(Sen)' : ''}</h3>
                            <span class="badge">${user.role}</span>
                            <span class="level-badge"><i class="fas fa-star"></i> Seviye ${user.level}</span>
                        </div>
                        <div class="user-stats">
                            <span><i class="fas fa-bolt"></i> %${user.activity} aktiflik</span>
                            <span><i class="fas fa-chart-line"></i> Haftalık: ${(user.weeklyXP || 0)} XP</span>
                        </div>
                    </div>
                    <div class="xp-section">
                        <div class="xp-label">
                            <span>🎯 ${user.xp.toLocaleString()} XP</span>
                            <span>📊 ${getXpPercentage(user.xp).toFixed(0)}%</span>
                        </div>
                        <div class="xp-bar-bg">
                            <div class="xp-bar-fill" style="width: ${getXpPercentage(user.xp)}%"></div>
                        </div>
                        <div class="xp-label" style="margin-top: 5px;">
                            <span>⬆️ ${nextLevelXP(user.xp) - user.xp} XP kalan</span>
                            <span>🎯 Seviye ${user.level + 1}</span>
                        </div>
                    </div>
                    <div class="points">
                        <div class="points-value">${user.xp.toLocaleString()}</div>
                        <div class="points-label">Toplam Puan</div>
                    </div>
                </div>
            `;
        }
        
        // Filtreleme
        function filterAndSearch() {
            let filtered = [...leadersData];
            if(currentSearch) {
                filtered = filtered.filter(user => user.name.toLowerCase().includes(currentSearch.toLowerCase()));
            }
            return filtered;
        }
        
        function renderLeaderboard() {
            const filteredData = filterAndSearch();
            const grid = document.getElementById("leaderboardGrid");
            if(filteredData.length === 0) {
                grid.innerHTML = `<div style="text-align: center; padding: 60px;"><i class="fas fa-search" style="font-size: 3rem;"></i><h3>Sonuç Bulunamadı</h3></div>`;
                return;
            }
            grid.innerHTML = filteredData.map(user => renderLeaderCard(user)).join('');
        }
        
        // Method kartlarını oluştur
        function renderMethods() {
            const methodsGrid = document.getElementById('methodsGrid');
            methodsGrid.innerHTML = `
                <div class="method-card" id="method-daily">
                    <i class="fas fa-calendar-day"></i>
                    <h4>Günlük Giriş</h4>
                    <p>+50 XP</p>
                    <div class="method-status">⏳ Bekliyor</div>
                </div>
                <div class="method-card" id="method-chest">
                    <i class="fas fa-gift"></i>
                    <h4>Günlük Kutu</h4>
                    <p>+100-500 XP</p>
                    <div class="method-status">⏳ Bekliyor</div>
                </div>
                <div class="method-card" id="method-hourly">
                    <i class="fas fa-clock"></i>
                    <h4>Saatlik Aktiflik</h4>
                    <p>+25 XP</p>
                    <div class="method-status">⏳ Bekliyor</div>
                </div>
                <div class="method-card" id="method-random">
                    <i class="fas fa-dice-d6"></i>
                    <h4>Rastgele Bonus</h4>
                    <p>+5-30 XP</p>
                    <div class="method-status">⏳ Bekliyor</div>
                </div>
                <div class="method-card" id="method-weekly">
                    <i class="fas fa-crown"></i>
                    <h4>Haftalık Lider</h4>
                    <p>+200 XP</p>
                    <div class="method-status">⏳ Bekliyor</div>
                </div>
            `;
        }
        
        // Event Listeners
        document.getElementById("searchInput")?.addEventListener("input", (e) => {
            currentSearch = e.target.value;
            renderLeaderboard();
        });
        
        document.getElementById("claimBtn")?.addEventListener("click", claimDailyBox);
        
        // Otomatik kontroller için interval (her 30 saniyede bir kontrol et)
        setInterval(() => {
            runAutoChecks();
            updateDailyButton();
        }, 30000);
        
        // Sayfa yükleme
        document.addEventListener("DOMContentLoaded", () => {
            loadFromLocalStorage();
            renderMethods();
            runAutoChecks();
            updateDailyButton();
            renderLeaderboard();
        });
    </script>
</body>
</html>
