<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTF - Geri Bildirim & Puanlama</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* RENK PALETİ - Siyah, Beyaz, Koyu Kırmızı, Açık Mavi, Altın Sarısı */
        :root {
            --siyah: #0A0A0F;
            --siyah-2: #1A1A20;
            --altin: #FFD700;
            --kirmizi: #8B0000;
            --beyaz: #FFFFFF;
            --mavi: #87CEEB;
            --gri: #2A2A30;
            --koyu-gri: #1e1e24;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--siyah);
            color: var(--beyaz);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Arka Plan Animasyonu */
        @keyframes slowDrift {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(255, 215, 0, 0.03) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(139, 0, 0, 0.03) 0%, transparent 40%),
                        radial-gradient(circle at 40% 85%, rgba(135, 206, 235, 0.03) 0%, transparent 40%);
            animation: slowDrift 35s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        /* Animasyonlar */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes starGlow {
            0% { transform: scale(1); text-shadow: 0 0 0px var(--altin); }
            50% { transform: scale(1.1); text-shadow: 0 0 8px var(--altin); }
            100% { transform: scale(1); text-shadow: 0 0 0px var(--altin); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .fade-up { animation: fadeInUp 0.6s ease forwards; }
        .fade-left { animation: fadeInLeft 0.6s ease forwards; }
        .fade-right { animation: fadeInRight 0.6s ease forwards; }
        .scale-in { animation: scaleIn 0.5s ease forwards; }

        /* HAMBURGER MENU */
        .hamburger {
            width: 40px;
            height: 30px;
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            padding: 5px;
            animation: fadeInLeft 0.6s ease;
        }

        .hamburger span {
            display: block;
            height: 3px;
            width: 100%;
            background: var(--altin);
            border-radius: 3px;
            transition: 0.3s;
        }

        .hamburger.open .bar1 {
            transform: translateY(12px) rotate(45deg);
            background: var(--mavi);
        }

        .hamburger.open .bar2 {
            opacity: 0;
        }

        .hamburger.open .bar3 {
            transform: translateY(-12px) rotate(-45deg);
            background: var(--mavi);
        }

        /* SIDE MENU */
        .side-menu {
            width: 260px;
            height: 100vh;
            background: var(--siyah-2);
            position: fixed;
            top: 0;
            left: -280px;
            z-index: 99;
            transition: left 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            padding: 80px 0 30px;
            border-right: 2px solid var(--altin);
        }

        .side-menu.open {
            left: 0;
        }

        .menu-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 25px;
            color: var(--beyaz);
            text-decoration: none;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .menu-link i {
            width: 20px;
            color: var(--altin);
        }

        .menu-link:hover {
            background: rgba(255, 215, 0, 0.1);
            border-left-color: var(--altin);
        }

        .menu-link.active {
            background: rgba(255, 215, 0, 0.15);
            border-left-color: var(--altin);
            color: var(--altin);
        }

        .menu-footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* Ana İçerik */
        .main-content {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 80px;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
        }

        /* Başlık */
        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2rem, 6vw, 3.2rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--altin), var(--mavi));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            animation: fadeInUp 0.6s;
        }

        .page-header p {
            color: var(--beyaz);
            opacity: 0.8;
            font-size: 1.1rem;
            animation: fadeInUp 0.6s 0.1s both;
        }

        /* Grid Yapısı */
        .rating-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        /* Kartlar */
        .card {
            background: var(--siyah-2);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: all 0.3s;
            animation: scaleIn 0.5s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--altin);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            font-size: 1.6rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card h2 i {
            color: var(--altin);
            font-size: 1.8rem;
        }

        /* Yıldız Puanlama */
        .stars-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stars-row {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stars {
            display: flex;
            gap: 8px;
            cursor: pointer;
        }

        .star {
            font-size: 2.2rem;
            color: #444;
            transition: all 0.15s;
            cursor: pointer;
        }

        .star:hover,
        .star.hover {
            transform: scale(1.1);
        }

        .star.active {
            color: var(--altin);
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
        }

        .rating-value {
            font-size: 1rem;
            color: var(--beyaz);
            opacity: 0.7;
        }

        /* Geri Bildirim Alanı */
        .feedback-area {
            margin-top: 20px;
        }

        textarea {
            width: 100%;
            background: var(--siyah);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            padding: 12px 15px;
            color: var(--beyaz);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            resize: vertical;
            transition: all 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--altin);
            box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.2);
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Butonlar */
        .btn-submit {
            background: linear-gradient(135deg, var(--altin), #e6c300);
            color: var(--siyah);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 15px;
            width: 100%;
            font-family: inherit;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Ortalama Puan Kartı */
        .average-card {
            background: linear-gradient(135deg, var(--kirmizi), #5a0000);
            border: none;
            position: relative;
            overflow: hidden;
        }

        .average-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 60%);
            animation: slowDrift 20s linear infinite;
            pointer-events: none;
        }

        .average-score {
            text-align: center;
            padding: 20px 0;
        }

        .big-score {
            font-size: 5rem;
            font-weight: 800;
            color: var(--altin);
            line-height: 1;
            margin-bottom: 10px;
        }

        .total-votes {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* Yıldız Gösterge */
        .star-display {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
        }

        .star-display i {
            font-size: 2.2rem;
            color: #444;
        }

        .star-display i.filled {
            color: var(--altin);
        }

        /* Geri Bildirim Listesi */
        .feedback-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .feedback-item {
            background: rgba(10, 10, 15, 0.6);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 3px solid var(--altin);
            animation: fadeInRight 0.3s ease;
        }

        .feedback-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .feedback-stars {
            color: var(--altin);
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .feedback-date {
            font-size: 0.7rem;
            opacity: 0.5;
        }

        .feedback-text {
            font-size: 0.85rem;
            opacity: 0.8;
            word-break: break-word;
        }

        .empty-feedback {
            text-align: center;
            opacity: 0.5;
            padding: 20px;
            font-style: italic;
        }

        /* Loading */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--siyah);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--siyah-2);
            border-left: 4px solid var(--altin);
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 200;
            transform: translateX(400px);
            transition: transform 0.3s;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast i {
            color: var(--altin);
            font-size: 1.2rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .rating-grid {
                grid-template-columns: 1fr;
            }
            
            .card {
                padding: 20px;
            }
            
            .star {
                font-size: 1.6rem;
            }
            
            .big-score {
                font-size: 3.5rem;
            }
            
            .toast {
                bottom: 20px;
                right: 20px;
                left: 20px;
                transform: translateY(100px);
            }
            
            .toast.show {
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- ANA İÇERİK -->
    <div class="main-content">
        <div class="container">
            <div class="page-header">
                <h1>Geri Bildirim & Puanlama</h1>
                <p>Deneyiminizi paylaşın, topluluğumuzu geliştirin</p>
            </div>

            <div class="rating-grid">
                <!-- KİŞİSEL PUANLAMA KARTI -->
                <div class="card fade-up">
                    <h2><i class="fas fa-star"></i> Senin Puanın</h2>
                    <div class="stars-container">
                        <div class="stars-row">
                            <div class="stars" id="ratingStars">
                                <i class="far fa-star star" data-value="1"></i>
                                <i class="far fa-star star" data-value="2"></i>
                                <i class="far fa-star star" data-value="3"></i>
                                <i class="far fa-star star" data-value="4"></i>
                                <i class="far fa-star star" data-value="5"></i>
                            </div>
                            <span class="rating-value" id="selectedRatingText">Puan seçilmedi</span>
                        </div>
                    </div>
                    
                    <div class="feedback-area">
                        <textarea id="feedbackText" rows="3" placeholder="Geri bildiriminizi yazın... (isteğe bağlı)"></textarea>
                    </div>
                    
                    <button class="btn-submit" id="submitBtn">
                        <i class="fas fa-paper-plane"></i> Gönder
                    </button>
                </div>

                <!-- ORTALAMA PUAN KARTI -->
                <div class="card average-card fade-up" style="animation-delay: 0.1s;">
                    <h2><i class="fas fa-chart-line"></i> Ortalama Puan</h2>
                    <div class="average-score">
                        <div class="big-score" id="averageScore">--</div>
                        <div class="total-votes" id="totalVotes">Yükleniyor...</div>
                        <div class="star-display" id="averageStars">
                            <i class="far fa-star"></i>
                            <i class="far fa-star"></i>
                            <i class="far fa-star"></i>
                            <i class="far fa-star"></i>
                            <i class="far fa-star"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SON GERİ BİLDİRİMLER -->
            <div class="card fade-up" style="animation-delay: 0.2s;">
                <h2><i class="fas fa-comments"></i> Son Geri Bildirimler</h2>
                <div id="feedbackList" class="feedback-list">
                    <div class="empty-feedback">
                        <i class="fas fa-spinner fa-spin"></i> Yükleniyor...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST BİLDİRİM -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Gönderildi!</span>
    </div>

    <script>
        // ========== FIREBASE YAPILANDIRMASI ==========
        // ⚠️ BURAYA KENDİ FIREBASE CONFIG'İNİZİ YAPIŞTIRIN ⚠️
        // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDAi_IqftZcuMmgvjIHlZXlC0hV2KmZA78",
  authDomain: "ltf-puanlama-9a139.firebaseapp.com",
  projectId: "ltf-puanlama-9a139",
  storageBucket: "ltf-puanlama-9a139.firebasestorage.app",
  messagingSenderId: "158627242883",
  appId: "1:158627242883:web:09aa2caff119ae9ebc0cb6",
  measurementId: "G-T1C2ZFV4MC"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

        
        // Firebase'i başlat
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // ========== GLOBAL DEĞİŞKENLER ==========
        let currentRating = 0;
        let isSubmitting = false;
        
        const stars = document.querySelectorAll('.star');
        const selectedRatingText = document.getElementById('selectedRatingText');
        const submitBtn = document.getElementById('submitBtn');
        const feedbackTextarea = document.getElementById('feedbackText');
        
        // ========== YILDIZ PUANLAMA ==========
        stars.forEach(star => {
            star.addEventListener('mouseenter', function() {
                const value = parseInt(this.dataset.value);
                highlightStars(value);
            });
            
            star.addEventListener('mouseleave', function() {
                highlightStars(currentRating);
            });
            
            star.addEventListener('click', function() {
                currentRating = parseInt(this.dataset.value);
                highlightStars(currentRating);
                updateRatingText();
                
                this.style.animation = 'starGlow 0.3s ease';
                setTimeout(() => {
                    this.style.animation = '';
                }, 300);
            });
        });
        
        function highlightStars(rating) {
            stars.forEach(star => {
                const value = parseInt(star.dataset.value);
                if (value <= rating) {
                    star.className = 'fas fa-star star active';
                } else {
                    star.className = 'far fa-star star';
                }
            });
        }
        
        function updateRatingText() {
            if (currentRating === 0) {
                selectedRatingText.textContent = 'Puan seçilmedi';
            } else {
                selectedRatingText.textContent = `${currentRating} / 5 yıldız`;
            }
        }
        
        // ========== FIREBASE VERİLERİNİ OKU ==========
        function loadDataFromFirebase() {
            // Ortalama puan ve tüm puanları dinle
            const ratingsRef = database.ref('ratings');
            const feedbacksRef = database.ref('feedbacks');
            
            ratingsRef.on('value', (snapshot) => {
                const ratingsData = snapshot.val();
                if (ratingsData) {
                    // ratings bir nesne, değerleri diziye çevir
                    const ratingsArray = Object.values(ratingsData);
                    updateAverageScore(ratingsArray);
                } else {
                    updateAverageScore([]);
                }
            });
            
            feedbacksRef.on('value', (snapshot) => {
                const feedbacksData = snapshot.val();
                if (feedbacksData) {
                    const feedbacksArray = Object.values(feedbacksData);
                    // Tarihe göre sırala (en yeniler önce)
                    feedbacksArray.sort((a, b) => b.timestamp - a.timestamp);
                    updateFeedbackList(feedbacksArray);
                } else {
                    updateFeedbackList([]);
                }
            });
        }
        
        function updateAverageScore(ratingsArray) {
            const avgScoreEl = document.getElementById('averageScore');
            const totalVotesEl = document.getElementById('totalVotes');
            const avgStarsEl = document.getElementById('averageStars');
            
            if (ratingsArray.length === 0) {
                avgScoreEl.textContent = '0.00';
                totalVotesEl.textContent = '0 kişi puanladı';
                avgStarsEl.innerHTML = `
                    <i class="far fa-star"></i>
                    <i class="far fa-star"></i>
                    <i class="far fa-star"></i>
                    <i class="far fa-star"></i>
                    <i class="far fa-star"></i>
                `;
                return;
            }
            
            const sum = ratingsArray.reduce((a, b) => a + b, 0);
            const avg = sum / ratingsArray.length;
            const avgRounded = avg.toFixed(2);
            avgScoreEl.textContent = avgRounded;
            totalVotesEl.textContent = `${ratingsArray.length} kişi puanladı`;
            
            // Yıldız gösterimi
            const fullStars = Math.round(avg * 2) / 2; // yarım yıldız desteği
            const fullStarsCount = Math.floor(fullStars);
            const hasHalf = fullStars % 1 !== 0;
            
            avgStarsEl.innerHTML = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= fullStarsCount) {
                    avgStarsEl.innerHTML += '<i class="fas fa-star filled" style="color: var(--altin);"></i>';
                } else if (hasHalf && i === fullStarsCount + 1) {
                    avgStarsEl.innerHTML += '<i class="fas fa-star-half-alt filled" style="color: var(--altin);"></i>';
                } else {
                    avgStarsEl.innerHTML += '<i class="far fa-star"></i>';
                }
            }
        }
        
        function updateFeedbackList(feedbacksArray) {
            const feedbackListDiv = document.getElementById('feedbackList');
            
            if (feedbacksArray.length === 0) {
                feedbackListDiv.innerHTML = `
                    <div class="empty-feedback">
                        <i class="fas fa-inbox"></i> Henüz geri bildirim yok. İlk sen paylaş!
                    </div>
                `;
                return;
            }
            
            // Son 10 geri bildirimi göster
            const recentFeedbacks = feedbacksArray.slice(0, 10);
            
            feedbackListDiv.innerHTML = recentFeedbacks.map(fb => `
                <div class="feedback-item">
                    <div class="feedback-header">
                        <div class="feedback-stars">
                            ${'★'.repeat(fb.rating)}${'☆'.repeat(5 - fb.rating)}
                        </div>
                        <div class="feedback-date">${fb.date}</div>
                    </div>
                    <div class="feedback-text">${escapeHtml(fb.text || 'Geri bildirim yazılmamış')}</div>
                </div>
            `).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ========== TOAST BİLDİRİM ==========
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = toast.querySelector('i');
            
            toastMessage.textContent = message;
            
            if (isError) {
                toastIcon.className = 'fas fa-exclamation-circle';
                toast.style.borderLeftColor = 'var(--kirmizi)';
            } else {
                toastIcon.className = 'fas fa-check-circle';
                toast.style.borderLeftColor = 'var(--altin)';
            }
            
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // ========== FIREBASE'E VERİ GÖNDER ==========
        async function submitToFirebase(rating, feedbackText) {
            const now = new Date();
            const dateStr = `${now.getDate()}/${now.getMonth() + 1}/${now.getFullYear()} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            
            const feedbackId = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            const ratingId = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            
            const feedbackData = {
                rating: rating,
                text: feedbackText || '',
                date: dateStr,
                timestamp: now.getTime()
            };
            
            const ratingData = {
                rating: rating,
                timestamp: now.getTime()
            };
            
            try {
                // Geri bildirimi kaydet
                await database.ref('feedbacks/' + feedbackId).set(feedbackData);
                // Puanı kaydet
                await database.ref('ratings/' + ratingId).set(ratingData);
                return true;
            } catch (error) {
                console.error('Firebase hatası:', error);
                return false;
            }
        }
        
        // ========== GÖNDER BUTONU ==========
        submitBtn.addEventListener('click', async () => {
            if (isSubmitting) return;
            
            if (currentRating === 0) {
                showToast('Lütfen bir puan seçin!', true);
                const starsContainer = document.querySelector('.stars');
                starsContainer.style.animation = 'shake 0.4s ease';
                setTimeout(() => {
                    starsContainer.style.animation = '';
                }, 400);
                return;
            }
            
            isSubmitting = true;
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> Gönderiliyor...';
            submitBtn.disabled = true;
            
            const feedbackText = feedbackTextarea.value.trim();
            const success = await submitToFirebase(currentRating, feedbackText);
            
            if (success) {
                showToast('Geri bildiriminiz için teşekkürler! 🎉');
                
                // Formu sıfırla
                currentRating = 0;
                highlightStars(0);
                updateRatingText();
                feedbackTextarea.value = '';
                
                // Buton animasyonu
                submitBtn.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    submitBtn.style.transform = '';
                }, 150);
            } else {
                showToast('Bir hata oluştu. Lütfen tekrar deneyin.', true);
            }
            
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
            isSubmitting = false;
        });
        
        // ========== HAMBURGER MENU ==========
        const btn = document.getElementById("menuBtn");
        const menu = document.getElementById("sideMenu");

        btn.addEventListener("click", function(e) {
            e.stopPropagation();
            menu.classList.toggle("open");
            btn.classList.toggle("open");
        });

        document.addEventListener('click', function(e) {
            if (!menu.contains(e.target) && !btn.contains(e.target)) {
                menu.classList.remove('open');
                btn.classList.remove('open');
            }
        });
        
        // ========== SAYFA YÜKLENDİĞİNDE ==========
        function init() {
            loadDataFromFirebase();
            highlightStars(0);
        }
        
        init();
    </script>
</body>
</html>
